name: htb_document_progress
version: "2.1.0"
description: |
  Update HTB box documentation (recon.md, exploit.md, privesc.md) based on recent 
  session activity. Fully delegates analysis to subagent for third-party perspective.
  
  Usage: document progress for <box>
         htb_document_progress --box <box> [--dry-run]

author: Neo

invocations:
  - document progress for {box}
  - htb_document_progress --box {box}

triggers:
  - pattern: "document progress for {box}"
    action: document_progress
  - pattern: "htb_document_progress --box {box}"
    action: document_progress

parameters:
  box:
    type: string
    required: true
    description: Name of the active box to document
  dry_run:
    type: boolean
    required: false
    default: false
    description: Preview changes without applying

workflow:
  1_validation:
    script: scripts/document.sh
    description: Validates box exists, outputs READY signal with metadata
    output_format: |
      DELEGATE_READY
      BOX_NAME:Writeup
      BOX_DIR:/path/to/box
      DRY_RUN:false
      EXISTING_FILES:
        recon.md:45
        raw_data:nmap.initial
  2_delegation:
    agent: subagent
    description: |
      Parent agent (Neo) spawns subagent with BOX_NAME, BOX_DIR, DRY_RUN.
      Subagent:
      - Calls honcho_session for session transcript
      - Reads existing docs (recon.md, exploit.md, privesc.md)
      - Explores loot/ and raw_data/ directories
      - Analyzes and returns JSON with proposed updates
    output_format: |
      {
        "recon.md": "full updated content or null",
        "exploit.md": "full updated content or null",
        "privesc.md": "full updated content or null",
        "summary": "Brief description of changes"
      }
  3_application:
    agent: neo
    description: |
      Parent agent receives JSON, uses apply.sh to write updates:
      ./apply.sh $BOX_DIR /tmp/subagent_result.json
      
      Or manually applies with write tool.
      Reports summary to user.

output:
  type: file
  path: ~/.openclaw/workspace-neo/htb/boxes/active/{box}/
  format: markdown

notes: |
  v2.1 - Added apply.sh for automated update application
  - Subagent has direct tool access (honcho_session, read, exec)
  - Parent agent (Neo) is thin orchestrator: validate, spawn, apply
  - Third-party analysis provides fresh perspective
  - apply.sh parses subagent JSON and writes to docs
